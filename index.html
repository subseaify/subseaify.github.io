<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Subseaify</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:black;
      color:white;
      overflow-x:hidden;
    }

    .hero{
      position:relative;
      min-height:100vh;
      padding:40px 20px 80px;
      overflow:hidden;
    }

    .bg-video{
      position:fixed;
      inset:0;

      width:100%;
      height:100%;

      object-fit:cover;

      z-index:-3;
    }

    .overlay{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,0.30);

      z-index:-2;
    }

    .logo{
      position:absolute;

      top:25px;
      left:30px;

      width:240px;
      max-width:42vw;

      z-index:5;
    }

    .content{
      max-width:1150px;

      margin:140px auto 80px;

      text-align:center;
    }

    h1{
      font-family:
      "Trebuchet MS",
      Arial,
      sans-serif;

      font-size:72px;

      line-height:1.05;

      font-weight:900;

      letter-spacing:0.5px;

      margin-bottom:70px;

      text-shadow:
      0 0 22px rgba(0,0,0,0.55);
    }

    h1 span{
      color:#29d5ff;
    }

    .slider{
      position:relative;

      width:100%;
      max-width:950px;

      aspect-ratio:16 / 9;

      margin:34px auto;

      overflow:hidden;

      border-radius:22px;

      border:
      2px solid rgba(41,213,255,0.85);

      box-shadow:
      0 0 45px rgba(0,0,0,0.6);

      background:black;

      backdrop-filter:blur(6px);
    }

    .slider img{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;

      object-fit:contain;

      background:black;
    }

    .enhanced{
      clip-path:inset(0 0 0 50%);
    }

    .handle{
      position:absolute;

      top:0;
      left:50%;

      width:3px;
      height:100%;

      background:#29d5ff;

      transform:translateX(-50%);

      z-index:4;
    }

    .handle::after{
      content:"↔";

      position:absolute;

      top:50%;
      left:50%;

      transform:
      translate(-50%,-50%);

      width:56px;
      height:56px;

      border-radius:50%;

      background:
      rgba(0,0,0,0.72);

      border:
      2px solid #29d5ff;

      display:flex;
      justify-content:center;
      align-items:center;

      color:#29d5ff;

      font-size:28px;
      font-weight:bold;

      backdrop-filter:blur(6px);
    }

    .slider input{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;

      opacity:0;

      cursor:ew-resize;

      z-index:10;
    }

    .label{
      position:absolute;

      top:16px;

      padding:8px 16px;

      border-radius:30px;

      background:
      rgba(0,0,0,0.55);

      backdrop-filter:blur(5px);

      font-size:15px;
      font-weight:bold;

      z-index:6;
    }

    .left{
      left:16px;
    }

    .right{
      right:16px;
      color:#29d5ff;
    }

    footer{
      text-align:center;

      padding:70px 20px 45px;

      color:#d7e5ec;
    }

    .footer-text{
      margin-bottom:14px;

      font-size:17px;

      letter-spacing:0.3px;

      opacity:0.92;
    }

    footer a{
      color:#29d5ff;

      text-decoration:none;

      font-size:18px;

      font-weight:bold;

      transition:0.3s ease;
    }

    footer a:hover{
      opacity:0.8;
    }

    .copyright{
      margin-top:24px;

      font-size:13px;

      opacity:0.65;

      letter-spacing:1px;
    }

    @media(max-width:768px){

      .logo{
        width:170px;
        left:18px;
      }

      .content{
        margin-top:110px;
      }

      h1{
        font-size:44px;

        margin-bottom:50px;
      }

      .slider{
        border-radius:16px;
      }

      .handle::after{
        width:44px;
        height:44px;

        font-size:22px;
      }

      .footer-text{
        font-size:15px;
      }

    }

  </style>

</head>

<body>

  <video
    autoplay
    muted
    loop
    playsinline
    class="bg-video"
  >
    <source
      src="./ocean.mp4"
      type="video/mp4"
    >
  </video>

  <div class="overlay"></div>

  <section class="hero">

    <img
      class="logo"
      src="./Subseaify_Logo.png"
      alt="Subseaify Logo"
    >

    <div class="content">

      <h1>
        Transforming<br>
        <span>Underwater Visibility</span>
      </h1>

      <!-- FIRST RESULT -->

      <div class="slider">

        <img
          src="./1_Original.jpg"
          alt="Original"
        >

        <img
          class="enhanced"
          src="./1_Enhanced.jpg"
          alt="Enhanced"
        >

        <div class="label left">
          Original
        </div>

        <div class="label right">
          Enhanced
        </div>

        <div class="handle"></div>

        <input
          type="range"
          min="0"
          max="100"
          value="50"
        >

      </div>

      <!-- SECOND RESULT -->

      <div class="slider">

        <img
          src="./2_Original.jpg"
          alt="Original"
        >

        <img
          class="enhanced"
          src="./2_Enhanced.jpg"
          alt="Enhanced"
        >

        <div class="label left">
          Original
        </div>

        <div class="label right">
          Enhanced
        </div>

        <div class="handle"></div>

        <input
          type="range"
          min="0"
          max="100"
          value="50"
        >

      </div>

    </div>

  </section>

  <footer>

    <div class="footer-text">
      For collaborations, research, or industry inquiries, connect with us on LinkedIn.
    </div>

    <a
      href="https://www.linkedin.com/in/aliebra/"
      target="_blank"
    >
      LinkedIn
    </a>

    <div class="copyright">
      © 2026 Subseaify
    </div>

  </footer>

  <script>

    document
      .querySelectorAll('.slider')
      .forEach(slider => {

      const range =
      slider.querySelector('input');

      const enhanced =
      slider.querySelector('.enhanced');

      const handle =
      slider.querySelector('.handle');

      range.addEventListener(
        'input',
        () => {

        const value =
        range.value;

        enhanced.style.clipPath =
        `inset(0 0 0 ${value}%)`;

        handle.style.left =
        `${value}%`;

      });

    });

  </script>

</body>

</html>
