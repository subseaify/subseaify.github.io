<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subseaify</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
    }

    .hero{
      position:relative;
      min-height:100vh;
      padding:35px 20px 60px;
      overflow:hidden;
    }

    .bg-video{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-3;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      z-index:-2;
    }

    .logo{
      position:absolute;
      top:28px;
      left:35px;
      width:230px;
      max-width:42vw;
      z-index:5;
    }

    .content{
      max-width:980px;
      margin:90px auto 0;
      text-align:center;
    }

    h1{
      font-size:56px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:1px;
      margin-bottom:30px;
    }

    h1 span{
      color:#29d5ff;
    }

    .slider{
      position:relative;
      width:100%;
      max-width:850px;
      height:260px;
      margin:18px auto;
      overflow:hidden;
      border-radius:18px;
      border:2px solid rgba(41,213,255,0.8);
      box-shadow:0 0 35px rgba(0,0,0,0.55);
      background:#000;
    }

    .slider img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .enhanced{
      clip-path:inset(0 0 0 50%);
    }

    .handle{
      position:absolute;
      top:0;
      left:50%;
      width:3px;
      height:100%;
      background:#29d5ff;
      transform:translateX(-50%);
      z-index:4;
    }

    .handle::after{
      content:"↔";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(0,0,0,0.7);
      border:2px solid #29d5ff;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#29d5ff;
      font-size:24px;
      font-weight:bold;
    }

    .slider input{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      opacity:0;
      cursor:ew-resize;
      z-index:10;
    }

    .label{
      position:absolute;
      top:14px;
      padding:7px 14px;
      border-radius:20px;
      background:rgba(0,0,0,0.55);
      font-weight:bold;
      z-index:6;
      font-size:14px;
    }

    .left{left:14px}
    .right{right:14px;color:#29d5ff}

    @media(max-width:768px){
      .logo{
        width:170px;
        left:20px;
      }

      .content{
        margin-top:100px;
      }

      h1{
        font-size:38px;
      }

      .slider{
        height:190px;
      }
    }
  </style>
</head>

<body>

  <video autoplay muted loop playsinline class="bg-video">
    <source src="./ocean.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <section class="hero">

    <img class="logo" src="./Subseaify_Logo.png" alt="Subseaify Logo">

    <div class="content">

      <h1>
        Transforming<br>
        <span>Underwater Visibility</span>
      </h1>

      <div class="slider">
        <img src="./1_Original.jpg" alt="Original underwater image">
        <img class="enhanced" src="./1_Enhanced.jpg" alt="Enhanced underwater image">
        <div class="label left">Original</div>
        <div class="label right">Enhanced</div>
        <div class="handle"></div>
        <input type="range" min="0" max="100" value="50">
      </div>

      <div class="slider">
        <img src="./2_Original.jpg" alt="Original underwater image">
        <img class="enhanced" src="./2_Enhanced.jpg" alt="Enhanced underwater image">
        <div class="label left">Original</div>
        <div class="label right">Enhanced</div>
        <div class="handle"></div>
        <input type="range" min="0" max="100" value="50">
      </div>

    </div>

  </section>

  <script>
    document.querySelectorAll('.slider').forEach(slider => {
      const range = slider.querySelector('input');
      const enhanced = slider.querySelector('.enhanced');
      const handle = slider.querySelector('.handle');

      range.addEventListener('input', () => {
        const value = range.value;
        enhanced.style.clipPath = `inset(0 0 0 ${value}%)`;
        handle.style.left = `${value}%`;
      });
    });
  </script>

</body>
</html>
